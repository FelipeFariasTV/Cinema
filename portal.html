<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINE FARIAS TV</title>
    <style>
        body { background: #0b0b0b; color: #05ea63; font-family: sans-serif; text-align: center; padding: 20px; }
        .btn-ready { 
            background: #05ea63; color: #000; padding: 20px; border-radius: 15px; 
            font-weight: bold; font-size: 18px; cursor: pointer; border: none; width: 100%;
        }
        /* O vídeo precisa estar visível para o PiP ser ativado no celular */
        #cineVideo { width: 100%; max-width: 300px; border-radius: 10px; margin-top: 20px; border: 2px solid #333; }
    </style>
</head>
<body>

    <h1>🎬 CINE FARIAS TV</h1>
    <p style="color: #fff;">1. Clique no Play no vídeo abaixo.<br>2. Depois clique no botão verde.</p>

    <video id="cineVideo" controls playsinline src="https://cinema.felipefariastv.com.br/stream.m3u8"></video>

    <br><br>
    <button class="btn-ready" onclick="ativarEIr()">🚀 ATIVAR CINEMA E IR PRA KICK</button>

    <script>
        async function ativarEIr() {
            const video = document.getElementById('cineVideo');
            
            try {
                // Tenta forçar a janela flutuante
                if (document.pictureInPictureEnabled) {
                    await video.requestPictureInPicture();
                }
            } catch (e) {
                alert("Dica: Dê o Play no vídeo primeiro, depois clique no botão!");
            }

            // Abre a Kick oficial (Garante sua View)
            setTimeout(() => {
                window.location.href = "https://kick.com/felipefariastv";
            }, 1000);
        }
    </script>
</body>
</html>
